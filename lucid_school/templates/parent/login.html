<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Parent Portal — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#1B4332 0%,#2D6A4F 60%,#1a3a2a 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.brand{text-align:center;margin-bottom:28px}
.brand-icon{width:60px;height:60px;background:linear-gradient(135deg,#1B4332,#2D6A4F);border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px}
.brand h1{font-size:20px;font-weight:700;color:#1B4332;line-height:1.2}
.brand p{font-size:12.5px;color:#666;margin-top:4px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;
  font-family:inherit;outline:none;transition:.15s}
.fg input:focus{border-color:#1B4332;box-shadow:0 0 0 3px rgba(27,67,50,.08)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1B4332,#2D6A4F);color:#fff;
  border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn:hover{opacity:.92}
.error{background:#FFEBEE;border:1px solid #FFCDD2;border-radius:8px;padding:10px 14px;
  color:#B71C1C;font-size:13px;margin-bottom:14px}
.note{background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;padding:10px 14px;
  font-size:12px;color:#15803D;margin-top:16px;line-height:1.6}
.portal-links{display:flex;gap:8px;justify-content:center;margin-top:16px;font-size:12px}
.portal-links a{color:#1B4332;text-decoration:none;opacity:.7}
.portal-links a:hover{opacity:1}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">👨‍👩‍👧</div>
    <h1>Parent Portal</h1>
    <p>View your child's academic progress</p>
  </div>

  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="fg">
      <label>School Code</label>
      <input name="school_code" placeholder="e.g. LIS" required autocomplete="organization"
             value="{{ request.form.get('school_code','') }}">
    </div>
    <div class="fg">
      <label>Username</label>
      <input name="username" placeholder="Your parent username" required autocomplete="username"
             value="{{ request.form.get('username','') }}">
    </div>
    <div class="fg">
      <label>Password</label>
      <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">🔓 Sign In</button>
  </form>

  <div class="note">
    💡 <strong>First time?</strong> Your school office will provide your username and password.
    Contact your school's administrator for access.
  </div>

  <div class="portal-links">
    <a href="/login">Staff Login →</a>
    <span>·</span>
    <a href="/teacher/login">Teacher Login →</a>
  </div>
</div>
</body>
</html>
