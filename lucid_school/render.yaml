services:
  - type: web
    name: lucid-school
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python database.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --preload
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lucid-school-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: lucid-school-db
    databaseName: lucid_school
    user: lucid_admin
    plan: free
